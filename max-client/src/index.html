<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Maximizador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF2E93;
      --secondary: #FF8000;
      --bg-dark: #0f172a;
      --surface: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(255, 46, 147, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 128, 0, 0.15), transparent 25%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 3s infinite alternate;
    }

    @keyframes pulse {
      0% {
        filter: hue-rotate(0deg);
      }

      100% {
        filter: hue-rotate(30deg);
      }
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    input {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1.25rem;
      font-family: 'Outfit', sans-serif;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid var(--glass-border);
      border-radius: 16px;
      color: var(--text);
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255, 46, 147, 0.2);
    }

    button {
      padding: 1.2rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: all 0.5s ease;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 20px rgba(255, 46, 147, 0.3);
    }

    button:hover::before {
      left: 100%;
    }

    button:active {
      transform: scale(0.98);
    }

    .result-frame {
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: left;
      min-height: 150px;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #10b981;
      /* Verde divertido para o log */
    }

    .result-frame::-webkit-scrollbar {
      width: 8px;
    }

    .result-frame::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .result-frame::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 8px;
    }

    .result-frame::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Super Maximizador</h1>
    <div class="input-group">
      <input id="mensagem" placeholder="Digite algo incrível aqui..." autocomplete="off" />
      <button id="enviar">enviar mensagem para processamento</button>
    </div>
    <div class="result-frame">
      <pre id="log"></pre>
    </div>
  </div>

  <script type="module" src="./GUI/index.ts"></script>
</body>

</html>
